# CLI Academy — local multi-service development
#
# This file manages the Python backend API only.
# The Next.js frontend runs separately: cd apps/web && npm run dev
# The backend deploys to Google Cloud Run in production; this compose file is for local dev only.
#
# Usage:
#   cp apps/api/.env.example apps/api/.env   # then fill in real values
#   docker compose up --build                # build and start the API
#   docker compose up -d                     # start in background
#   docker compose logs -f api               # stream logs
#   docker compose down                      # stop and remove containers
#
# The backend exposes /health only (gamification and tutor run in Next.js).

version: "3.9"
services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
    env_file:
      - apps/api/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
