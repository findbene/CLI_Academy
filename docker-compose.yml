# CLI Academy — local multi-service development
#
# This file manages the Python backend API only.
# The Next.js frontend runs separately: cd apps/web && npm run dev
# The backend deploys to Google Cloud Run in production; this compose file is for local dev only.
#
# Usage:
#   docker compose up --build        # build and start the API
#   docker compose up -d             # start in background
#   docker compose logs -f api       # stream logs
#   docker compose down              # stop and remove containers
#
# The frontend at http://localhost:3000 will proxy API calls to http://localhost:8000.
# Set NEXT_PUBLIC_API_URL=http://localhost:8000 in apps/web/.env.local for local dev.

version: "3.9"
services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
      # Copy your apps/api/.env values here or use env_file
    env_file:
      - apps/api/.env.example
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
