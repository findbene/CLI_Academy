<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="The Agentic Loop diagram">
  <title>The Agentic Loop</title>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4CAF50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">The Agentic Loop</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">How Claude reasons, acts, and adapts in a continuous cycle</text>

  <!-- Connecting arcs (drawn before circles so circles sit on top) -->
  <!-- Plan → Act arc (top-right) -->
  <path d="M 490,195 Q 590,200 555,310" fill="none" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Act → Observe arc (bottom) -->
  <path d="M 450,380 Q 400,440 340,380" fill="none" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Observe → Plan arc (top-left) -->
  <path d="M 245,310 Q 210,200 310,195" fill="none" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 1. Plan circle -->
  <circle cx="400" cy="175" r="85" fill="#1a1f2e" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="400" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#4CAF50">1</text>
  <text x="400" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Plan</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#aaa">Read context,</text>
  <text x="400" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#aaa">form a goal</text>

  <!-- 2. Act circle -->
  <circle cx="570" cy="340" r="85" fill="#1a1f2e" stroke="#2196F3" stroke-width="2.5"/>
  <text x="570" y="327" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#2196F3">2</text>
  <text x="570" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Act</text>
  <text x="570" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#aaa">Execute</text>
  <text x="570" y="379" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#aaa">tool calls</text>

  <!-- 3. Observe circle -->
  <circle cx="230" cy="340" r="85" fill="#1a1f2e" stroke="#9C27B0" stroke-width="2.5"/>
  <text x="230" y="327" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#9C27B0">3</text>
  <text x="230" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Observe</text>
  <text x="230" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#aaa">Review results,</text>
  <text x="230" y="379" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#aaa">check errors</text>

  <!-- Arc labels -->
  <text x="560" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4CAF50" font-style="italic">decide &amp; begin</text>
  <text x="400" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4CAF50" font-style="italic">results in</text>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4CAF50" font-style="italic">re-plan</text>

  <!-- Footer note -->
  <text x="400" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">The loop continues until the goal is met or the session ends.</text>
</svg>
