<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="The Claw Ecosystem tier diagram">
  <title>The Claw Ecosystem</title>
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M2,8 L5,2 L8,8" fill="none" stroke="#666" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">The Claw Ecosystem</text>

  <!-- CAREER tier (top) -->
  <rect x="40" y="58" width="720" height="80" rx="8" fill="#FFB900" fill-opacity="0.12" stroke="#FFB900" stroke-width="1.5"/>
  <text x="68" y="82" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFB900" letter-spacing="1.5">CAREER</text>
  <rect x="68" y="90" width="155" height="34" rx="6" fill="#FFB900" fill-opacity="0.2" stroke="#FFB900" stroke-width="1"/>
  <text x="150" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFB900">Portfolio Capstone</text>
  <rect x="242" y="90" width="130" height="34" rx="6" fill="#FFB900" fill-opacity="0.2" stroke="#FFB900" stroke-width="1"/>
  <text x="307" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFB900">Job Brief</text>
  <rect x="391" y="90" width="150" height="34" rx="6" fill="#FFB900" fill-opacity="0.2" stroke="#FFB900" stroke-width="1"/>
  <text x="466" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFB900">Alumni Missions</text>

  <!-- Up arrows between tiers -->
  <line x1="400" y1="152" x2="400" y2="164" stroke="#555" stroke-width="2" marker-end="url(#arrowUp)"/>

  <!-- ADVANCED tier -->
  <rect x="40" y="168" width="720" height="80" rx="8" fill="#9C27B0" fill-opacity="0.12" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="68" y="192" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#9C27B0" letter-spacing="1.5">ADVANCED</text>
  <rect x="68" y="200" width="145" height="34" rx="6" fill="#9C27B0" fill-opacity="0.2" stroke="#9C27B0" stroke-width="1"/>
  <text x="140" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#CE93D8">Custom Runtimes</text>
  <rect x="232" y="200" width="130" height="34" rx="6" fill="#9C27B0" fill-opacity="0.2" stroke="#9C27B0" stroke-width="1"/>
  <text x="297" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#CE93D8">Multi-Agent</text>
  <rect x="381" y="200" width="155" height="34" rx="6" fill="#9C27B0" fill-opacity="0.2" stroke="#9C27B0" stroke-width="1"/>
  <text x="458" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#CE93D8">Production Deploy</text>
  <rect x="555" y="200" width="180" height="34" rx="6" fill="#9C27B0" fill-opacity="0.2" stroke="#9C27B0" stroke-width="1"/>
  <text x="645" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#CE93D8">Safety + Observability</text>

  <!-- Up arrows -->
  <line x1="400" y1="262" x2="400" y2="274" stroke="#555" stroke-width="2" marker-end="url(#arrowUp)"/>

  <!-- ELECTIVE tier -->
  <rect x="40" y="278" width="720" height="80" rx="8" fill="#2196F3" fill-opacity="0.12" stroke="#2196F3" stroke-width="1.5"/>
  <text x="68" y="302" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2196F3" letter-spacing="1.5">ELECTIVE</text>
  <rect x="68" y="310" width="145" height="34" rx="6" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="1"/>
  <text x="140" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#90CAF9">Cowork Sessions</text>
  <rect x="232" y="310" width="130" height="34" rx="6" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="1"/>
  <text x="297" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#90CAF9">MCP Servers</text>
  <rect x="381" y="310" width="135" height="34" rx="6" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="1"/>
  <text x="448" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#90CAF9">Cross-Surface</text>
  <rect x="535" y="310" width="145" height="34" rx="6" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="1"/>
  <text x="607" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#90CAF9">Research Agent</text>

  <!-- Up arrows -->
  <line x1="400" y1="372" x2="400" y2="384" stroke="#555" stroke-width="2" marker-end="url(#arrowUp)"/>

  <!-- CORE tier (bottom) -->
  <rect x="40" y="388" width="720" height="80" rx="8" fill="#4CAF50" fill-opacity="0.12" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="68" y="412" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#4CAF50" letter-spacing="1.5">CORE</text>
  <rect x="68" y="420" width="145" height="34" rx="6" fill="#4CAF50" fill-opacity="0.2" stroke="#4CAF50" stroke-width="1"/>
  <text x="140" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A5D6A7">Claude Code CLI</text>
  <rect x="232" y="420" width="120" height="34" rx="6" fill="#4CAF50" fill-opacity="0.2" stroke="#4CAF50" stroke-width="1"/>
  <text x="292" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A5D6A7">CLAUDE.md</text>
  <rect x="371" y="420" width="150" height="34" rx="6" fill="#4CAF50" fill-opacity="0.2" stroke="#4CAF50" stroke-width="1"/>
  <text x="446" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A5D6A7">Tool Permissions</text>
  <rect x="540" y="420" width="145" height="34" rx="6" fill="#4CAF50" fill-opacity="0.2" stroke="#4CAF50" stroke-width="1"/>
  <text x="612" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A5D6A7">Local Context</text>

  <!-- Legend -->
  <text x="400" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">Progression flows upward — complete each tier before advancing.</text>
</svg>
