<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Calm workspace illustration</title>
  <desc id="desc">A serene desk scene with terminal window and coffee mug.</desc>
  <rect width="1200" height="700" fill="#101828"/>
  <rect x="130" y="120" width="940" height="420" rx="28" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="180" y="180" width="420" height="250" rx="20" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.25"/>
  <rect x="640" y="180" width="300" height="210" rx="20" fill="#1f2937"/>
  <circle cx="885" cy="455" r="62" fill="#f59e0b" opacity="0.88"/>
  <rect x="838" y="390" width="94" height="86" rx="18" fill="#fde68a" opacity="0.7"/>
  <text x="212" y="250" font-family="IBM Plex Mono, monospace" font-size="28" fill="#67e8f9">$ git status</text>
  <text x="212" y="300" font-family="IBM Plex Mono, monospace" font-size="22" fill="#d1fae5">working tree clean</text>
